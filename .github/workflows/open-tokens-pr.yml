name: Open Tokens PR

on:
  push:
    branches: ['tokens/**']
    paths:
      - 'tokens/tokens.json'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[Chore] Figma 디자인 토큰 업데이트" \
            --body "Token Studio에서 업데이트된 Figma 디자인 토큰입니다. 변경 사항 확인 후 머지해주세요." \
            --base main \
            --head "${{ github.ref_name }}" \
          || echo "PR already exists — skipping"
