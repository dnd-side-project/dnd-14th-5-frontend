name: Sync Figma Tokens

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tokens/tokens.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync tokens to globals.css
        run: node scripts/sync-figma-tokens.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: Figma 디자인 토큰 동기화'
          title: '[Chore] Figma 디자인 토큰 동기화'
          body: |
            Token Studio에서 변경된 디자인 토큰을 `src/styles/globals.css`에 반영합니다.

            **변경 감지 파일:** `tokens/tokens.json`
            **적용 파일:** `src/styles/globals.css`

            변경 사항을 확인 후 머지해주세요.
          branch: chore/sync-figma-tokens
          delete-branch: true
          base: main
